name: Enrich IP Classification Cache

on:
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 80

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run enrichment
        env:
          GREYNOISE_API_KEY: ${{ secrets.GREYNOISE_API_KEY }}
        run: python scripts/enrich_all.py

      - name: Commit enrichment results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds/classification_cache.json feeds/fortinet_ips_filtered.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update classification cache and filtered feed"
            git push
          fi
